# Stack for ingest + async evals:
#   API enqueues jobs to Redis; the worker consumes them and calls the groundedness judge (needs OPENAI_API_KEY).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: traceflow
      POSTGRES_PASSWORD: traceflow
      POSTGRES_DB: traceflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traceflow -d traceflow"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  db_viewer:
    image: adminer:4
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    env_file:
      - .env.docker
    restart: unless-stopped
    command:
      [
        "sh",
        "-c",
        "alembic -c alembic.ini upgrade head && python3 -m traceflow_jobs.worker",
      ]
    environment:
      PYTHONUNBUFFERED: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
